spring.application.name=MahaLakshmi Hospital Management System
spring.datasource.url=jdbc:h2:file:./data/hospital_db
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
server.port=${SERVER_PORT:8080}

# Email configuration (for notifications)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification gateway switches
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}
notification.email.from=no-reply@mahalakshmihospital.local
notification.sms.enabled=${NOTIFICATION_SMS_ENABLED:false}
notification.sms.provider-url=${NOTIFICATION_SMS_PROVIDER_URL:}
notification.sms.api-key=${NOTIFICATION_SMS_API_KEY:}

# Security
jwt.secret=${JWT_SECRET:MahalakshmiHospitalJwtSecretKeyForSecureSigning12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Payment gateway integration
payment.gateway.enabled=${PAYMENT_GATEWAY_ENABLED:false}
payment.gateway.provider=${PAYMENT_GATEWAY_PROVIDER:SIMULATION}
payment.gateway.url=${PAYMENT_GATEWAY_URL:}
payment.gateway.api-key=${PAYMENT_GATEWAY_API_KEY:}

# External AI service integration (Python OCR/NLP/ML API)
ai.external.enabled=${AI_EXTERNAL_ENABLED:false}
ai.external.base-url=${AI_EXTERNAL_BASE_URL:}
ai.external.api-key=${AI_EXTERNAL_API_KEY:}

# Upload constraints
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
